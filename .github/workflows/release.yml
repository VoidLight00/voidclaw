name: Build & Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build macOS (universal)
        run: npm run build:mac-local
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Ad-hoc codesign entire app bundle
        run: |
          APP="dist/mac-universal/VoidClaw.app"
          # Strip existing signatures first
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.node" \) -exec codesign --force --sign - {} \;
          # Sign frameworks
          find "$APP/Contents/Frameworks" -depth -name "*.framework" -exec codesign --force --sign - {} \;
          # Sign helpers
          find "$APP/Contents/Frameworks" -name "*.app" -exec codesign --force --sign - {} \;
          # Sign main app
          codesign --force --sign - "$APP"
          # Verify
          codesign --verify --deep --strict "$APP"
      - name: Rebuild DMG with signed app
        run: |
          rm -f dist/voidclaw.dmg
          hdiutil create -volname "VoidClaw" -srcfolder dist/mac-universal/VoidClaw.app -ov -format UDZO dist/voidclaw.dmg
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.RELEASE_TAG }}" dist/voidclaw.dmg --clobber

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Windows (x64)
        run: npm run build:win-local
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.RELEASE_TAG }}" dist/voidclaw-setup.exe --clobber
